services:

  # ── Main application (API + Web UI + built-in CPU transcoder) ────────────────
  nexusmediaserver:
    # Pre-built image from GitHub Container Registry (recommended — no build step needed):
    image: ghcr.io/rangodj/nexusmediaserver:latest
    # Build from source instead (comment out the image: line above and uncomment build: below):
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    #   target: production
    ports:
      - "${APP_PORT:-80}:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      TMDB_API_KEY: ${TMDB_API_KEY:-}
      TRANSCODER_SECRET: ${TRANSCODER_SECRET}
      PLUGINS_PATH: /config/plugins
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
    volumes:
      # Persistent config — plugins and server state live here.
      - ${CONFIG_PATH:-./config}:/config
      #
      # ── Media volumes ────────────────────────────────────────────────────────
      # Mount your media directories here. During the first-launch wizard you will
      # point each library at the container-side path you choose below.
      # Add as many mounts as you need. The :ro flag keeps them read-only.
      #
      # Example:
      # - /mnt/media/movies:/movies:ro
      # - /mnt/media/tv:/tv:ro
      # - /mnt/media/music:/music:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Transcoder (separate container — can be moved to a remote host) ──────────
  transcoder:
    # Pre-built image (recommended):
    image: ghcr.io/rangodj/nexusmediaserver-transcoder:latest
    # Build from source instead:
    # build:
    #   context: ./transcoder
    #   target: production
    container_name: nexus-transcoder-cpu
    environment:
      TRANSCODER_SECRET: ${TRANSCODER_SECRET}
      TRANSCODER_NAME: ${TRANSCODER_NAME:-transcoder-cpu}
      TRANSCODER_PUBLIC_URL: http://transcoder:3001
      API_URL: http://nexusmediaserver:3000
      HW_ACCEL: cpu
      HLS_OUTPUT_PATH: /tmp/hls
    volumes:
      - hls_segments:/tmp/hls
      #
      # ── Media volumes ────────────────────────────────────────────────────────
      # The transcoder must be able to read the same paths as the app container.
      # Mirror the media volume mounts you added to nexusmediaserver above.
      #
      # Example:
      # - /mnt/media/movies:/movies:ro
      # - /mnt/media/tv:/tv:ro
      # - /mnt/media/music:/music:ro
    depends_on:
      - nexusmediaserver
    restart: unless-stopped

  # ── NVIDIA GPU transcoder (NVENC) ─────────────────────────────────────────────
  # Requirements:
  #   • NVIDIA GPU on the Docker host
  #   • nvidia-container-toolkit installed (https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/)
  #   • Docker daemon configured to use the nvidia runtime
  #
  # To enable: uncomment this block and comment out or remove the "transcoder" service above.
  #
  # transcoder-nvidia:
  #   image: ghcr.io/rangodj/nexusmediaserver-transcoder:latest
  #   container_name: nexus-transcoder-nvidia
  #   runtime: nvidia
  #   environment:
  #     TRANSCODER_SECRET: ${TRANSCODER_SECRET}
  #     TRANSCODER_NAME: transcoder-nvidia
  #     TRANSCODER_PUBLIC_URL: http://transcoder-nvidia:3001
  #     API_URL: http://nexusmediaserver:3000
  #     HW_ACCEL: nvenc
  #     HLS_OUTPUT_PATH: /tmp/hls
  #     NVIDIA_VISIBLE_DEVICES: all
  #     NVIDIA_DRIVER_CAPABILITIES: video,compute,utility
  #   volumes:
  #     - hls_segments:/tmp/hls
  #     # Mirror your media volumes here too:
  #     # - /mnt/media/movies:/movies:ro
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]
  #   depends_on:
  #     - nexusmediaserver
  #   restart: unless-stopped

  # ── Intel GPU transcoder (VAAPI / QuickSync) ──────────────────────────────────
  # Requirements:
  #   • Intel CPU with integrated GPU (Broadwell or newer for H.264; Kaby Lake+ for H.265)
  #   • /dev/dri/renderD128 accessible on the Docker host (the default on Linux)
  #
  # To enable: uncomment this block and comment out or remove the "transcoder" service above.
  #
  # transcoder-intel:
  #   image: ghcr.io/rangodj/nexusmediaserver-transcoder:latest
  #   container_name: nexus-transcoder-intel
  #   environment:
  #     TRANSCODER_SECRET: ${TRANSCODER_SECRET}
  #     TRANSCODER_NAME: transcoder-intel
  #     TRANSCODER_PUBLIC_URL: http://transcoder-intel:3001
  #     API_URL: http://nexusmediaserver:3000
  #     HW_ACCEL: vaapi          # or: qsv
  #     VAAPI_DEVICE: /dev/dri/renderD128
  #     HLS_OUTPUT_PATH: /tmp/hls
  #   devices:
  #     - /dev/dri/renderD128:/dev/dri/renderD128
  #   volumes:
  #     - hls_segments:/tmp/hls
  #     # Mirror your media volumes here too:
  #     # - /mnt/media/movies:/movies:ro
  #   depends_on:
  #     - nexusmediaserver
  #   restart: unless-stopped

  # ── Database — choose ONE of the two options below ───────────────────────────
  #
  # OPTION A — Bundled Postgres (default, recommended for simple single-host setups)
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ${CONFIG_PATH:-./config}/db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    # ports:
    #   - "5432:5432"

  # OPTION B — External / self-hosted Postgres
  # Steps to switch:
  #   1. Comment out or delete the "db" service block above
  #   2. Remove "db" from the nexusmediaserver depends_on, or change to: depends_on: []
  #   3. Set DATABASE_URL in .env to point at your external host

volumes:
  hls_segments:
